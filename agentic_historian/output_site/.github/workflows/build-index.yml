name: Build catalogue index

# Regenerate docs/index.md from every docs/*/pipeline.json whenever the publisher
# commits a new document. The actor guard prevents the Action's own index commit
# from retriggering it (no infinite loop).

on:
  push:
    branches: [main]
    paths:
      - "docs/**/pipeline.json"

permissions:
  contents: write

jobs:
  build-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_index.py
      - name: Commit refreshed index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git diff --cached --quiet || git commit -m "build: refresh catalogue index [skip ci]"
          git push
