server {
    listen 443 ssl;
    server_name voyant.tei.dh.unibe.ch;

    ssl_certificate /etc/letsencrypt/live/tei.dh.unibe.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tei.dh.unibe.ch/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8888;
    }

    # Voyant /trombone/ API proxy (needed for tool features)
    location /trombone/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8888/trombone/;
    }
}

# DNS: A-record vorhanden → 130.92.252.85
# SSL: nach DNS-Propagation: certbot --nginx -d voyant.tei.dh.unibe.ch
# (Das bestehende Zertifikat deckt die subdomain NICHT ab)

# Redirect HTTP → HTTPS
server {
    server_name voyant.tei.dh.unibe.ch;
    listen 80;
    listen [::]:80;
    if ($host = voyant.tei.dh.unibe.ch) {
        return 301 https://$host$request_uri;
    }
    return 404;
}