server {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    server_name tei.dh.unibe.ch;
    # ── Voyant Tools ────────────────────────────────
    location /voyant {
        return 301 /voyant/;
    }
    location /voyant/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter 'href="/' 'href="/voyant/';
        sub_filter "src=\"/" "src=\"/voyant/";
        sub_filter "url('/" "url('/voyant/";
        sub_filter 'url("/' 'url("/voyant/';
        sub_filter 'window.location.replace("/' 'window.location.replace("/voyant/';
        sub_filter 'Voyant Tools' 'Voyant [REWRITTEN]';
        proxy_redirect / /voyant/;
        proxy_pass http://127.0.0.1:8889/;
    }
    location /resources/ {
        proxy_pass http://127.0.0.1:8889/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
    }
    location /trombone/ {
        proxy_pass http://127.0.0.1:8889/trombone/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
    }
    # ── SSRQ MCP ────────────────────────────────────────
    location /mcp/ssrq {
        if ($request_method = GET) { return 302 /mcp/ssrq/; }
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8002/mcp/ssrq;
    }
    location /mcp/ssrq/ {
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8002/mcp/ssrq/;
    }
    # ── EOS MCP ────────────────────────────────────────
    location = /mcp/eos {
        alias /var/www/html/eos-landing.html;
        default_type text/html;
    }
    location /mcp/eos/landing.html {
        alias /var/www/html/eos-landing.html;
        default_type text/html;
    }
    location /mcp/eos/sse {
        rewrite ^/mcp/eos/sse(.*)$ /sse$1 break;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect http://tei.dh.unibe.ch/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://tei.dh.unibe.ch/sse https://tei.dh.unibe.ch/mcp/eos/sse;
        proxy_redirect http://localhost:8000/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://localhost:8000/sse https://tei.dh.unibe.ch/mcp/eos/sse;
        proxy_redirect http://127.0.0.1:8000/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://127.0.0.1:8000/sse https://tei.dh.unibe.ch/mcp/eos/sse;
    }
    location /mcp/eos/messages {
        rewrite ^/mcp/eos/messages(.*)$ /messages$1 break;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect http://tei.dh.unibe.ch/messages/ https://tei.dh.unibe.ch/mcp/eos/messages/;
        proxy_redirect http://tei.dh.unibe.ch/messages https://tei.dh.unibe.ch/mcp/eos/messages;
        proxy_redirect http://localhost:8000/messages/ https://tei.dh.unibe.ch/mcp/eos/messages/;
        proxy_redirect http://localhost:8000/messages https://tei.dh.unibe.ch/mcp/eos/messages;
        proxy_redirect http://127.0.0.1:8000/messages/ https://tei.dh.unibe.ch/mcp/eos/messages/;
        proxy_redirect http://127.0.0.1:8000/messages https://tei.dh.unibe.ch/mcp/eos/messages;
    }
    location /mcp/eos {
        rewrite ^/mcp/eos(/.*)?$ /sse$1 break;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect http://tei.dh.unibe.ch/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://tei.dh.unibe.ch/sse https://tei.dh.unibe.ch/mcp/eos/sse;
        proxy_redirect http://localhost:8000/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://localhost:8000/sse https://tei.dh.unibe.ch/mcp/eos/sse;
        proxy_redirect http://127.0.0.1:8000/sse/ https://tei.dh.unibe.ch/mcp/eos/sse/;
        proxy_redirect http://127.0.0.1:8000/sse https://tei.dh.unibe.ch/mcp/eos/sse;
    }
    # ── KF MCP ─────────────────────────────────────────
    location /mcp/kf {
        if ($request_method = GET) { return 302 /mcp/kf/landing; }
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/mcp/kf(/.*)?$ /mcp$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_redirect default;
    }
    location /mcp/kf/landing {
        alias /var/www/html/kf-landing.html;
        default_type text/html;
    }
    # ── HLS MCP ────────────────────────────────────────
    location /mcp/hls {
        if ($request_method = GET) { return 302 /mcp/hls/landing; }
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/mcp/hls(/.*)?$ /mcp$1 break;
        proxy_pass http://127.0.0.1:8004;
        proxy_redirect default;
    }
    location /mcp/hls/landing {
        alias /var/www/html/hls-landing.html;
        default_type text/html;
    }
    location / {
        limit_except GET POST HEAD {
            deny all;
        }
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8081;
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tei.dh.unibe.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tei.dh.unibe.ch/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = tei.dh.unibe.ch) {
        return 301 https://$host$request_uri;
    }
    server_name tei.dh.unibe.ch;
    listen 80;
    listen [::]:80 default_server;
    return 404;
}
